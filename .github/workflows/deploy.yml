name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false   # never cancel an in-flight deploy

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/naegato/hackaton-2026/content
  STACK_NAME: hackaton

jobs:
  # ── 1. Build & push image to GHCR ──────────────────────────────────────────
  build-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/content/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. Deploy to Docker Swarm ───────────────────────────────────────────────
  # Runs on the self-hosted runner installed on the Swarm manager VM.
  # The runner must be labelled [self-hosted, linux, swarm-manager].
  # See infra/scripts/vm-setup.sh for runner installation.
  deploy:
    name: Deploy to Swarm
    needs: build-push
    runs-on: [self-hosted, linux, swarm-manager]

    environment:
      name: production

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Update Docker secrets
        env:
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: infra/scripts/secrets-update.sh

      - name: Deploy stack
        env:
          IMAGE_TAG: ${{ needs.build-push.outputs.image_tag }}
          MONGO_ROOT_USERNAME: ${{ secrets.MONGO_ROOT_USERNAME }}
          MONGO_ROOT_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD }}
          MONGO_DB_NAME: ${{ secrets.MONGO_DB_NAME }}
          APP_PUBLIC_URL: ${{ secrets.APP_PUBLIC_URL }}
          GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
          APP_OAUTH_REDIRECT_URI: ${{ secrets.APP_OAUTH_REDIRECT_URI }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: |
          docker stack deploy \
            --with-registry-auth \
            --compose-file infra/swarm/stack.yml \
            --prune \
            "${{ env.STACK_NAME }}"

      - name: Wait for rollout
        run: |
          echo "Waiting for api service to stabilise..."
          timeout 120 docker service ps \
            --no-trunc \
            --format "{{.CurrentState}}" \
            "${STACK_NAME}_api" | grep -q "Running" || true
          docker service ls --filter "name=${STACK_NAME}_api"
        env:
          STACK_NAME: ${{ env.STACK_NAME }}
