name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        # continue-on-error: @eslint/eslintrc@3.x throws "Converting circular
        # structure to JSON" when schema-validating the React plugin config
        # returned by eslint-config-next via FlatCompat. Upstream bug; does not
        # indicate real lint errors. Remove this flag once the issue is resolved
        # in @eslint/eslintrc or eslint-config-next.
        continue-on-error: true
        run: bun --filter=@hackaton-2k26/content lint

      - name: Type-check
        working-directory: apps/content
        run: bunx tsc --noEmit

  test:
    name: Integration tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:8.2
        env:
          MONGO_INITDB_ROOT_USERNAME: testuser
          MONGO_INITDB_ROOT_PASSWORD: testpass
          MONGO_INITDB_DATABASE: hackaton_test
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run integration tests
        working-directory: apps/content
        env:
          DATABASE_URL: mongodb://testuser:testpass@localhost:27017/hackaton_test?authSource=admin
          PAYLOAD_SECRET: ci-test-secret-not-used-in-prod
          SMTP_HOST: localhost
          SMTP_PORT: "1025"
          APP_PUBLIC_URL: http://localhost:8081
        run: bun run test:int

  build-check:
    name: Docker build check
    runs-on: ubuntu-latest
    # Only verify the build compiles — full image push happens in deploy.yml
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/content/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: hackaton-content:ci
